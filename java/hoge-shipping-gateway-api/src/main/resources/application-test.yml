server:
  port: 18083

spring:
  datasource:
    url: jdbc:h2:mem:orderhub-gateway-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  sql:
    init:
      mode: always
  h2:
    console:
      enabled: false

hoge:
  internal:
    customer-base-url: http://localhost:28081
    stock-base-url: http://localhost:28082
